<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #000, #1a1a1a);
            color: #FFFDD0;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.8);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
        }

        nav a {
            color: #FFFDD0;
            text-decoration: none;
            margin: 0 15px;
            transition: 0.3s;
        }

        nav a:hover {
            color: lightgreen;
        }

        /* TITLE */
        .title {
            text-align: center;
            margin-top: 50px;
        }

        .title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
        }

        .line {
            width: 60px;
            height: 2px;
            background: #FFFDD0;
            margin: 10px auto;
        }

        /* FORM */
        .form-container {
            width: 400px;
            margin: 40px auto;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .form-container input,
        .form-container textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .form-container textarea {
            height: 120px;
        }

        .form-container button {
            width: 100%;
            padding: 12px;
            background: #c8a96a;
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .form-container button:hover {
            background: #b89658;
        }

        /* INFO CARDS */
        .info {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-top: 40px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            width: 220px;
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            background: black;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .form-container {
                width: 90%;
            }

            .info {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">VELVET PLATE</div>

    <div>
        <a href="Home.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contacts.html">Contact</a>
    </div>
</nav>

<!-- TITLE -->
<div class="title">
    <h1>Contact Us</h1>
    <div class="line"></div>
</div>

<!-- FORM -->
<div class="form-container">
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <input type="text" placeholder="Subject">
    <textarea placeholder="Message"></textarea>
    <button>Send Message</button>
</div>

<!-- CONTACT INFO -->
<div class="info">

    <div class="card">
        <h3>📞 Phone</h3>
        <p>+263 78 011 6280</p>
    </div>

    <div class="card">
        <h3>✉️ Email</h3>
        <p>anesunyanga6@gmail.com</p>
    </div>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Velvet Plate | Where Every Bite Tastes Like Luxury</p>
</footer>

</body>
</html>
