<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #000, #1a1a1a);
            color: #FFFDD0;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.8);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
        }

        nav a {
            color: #FFFDD0;
            text-decoration: none;
            margin: 0 15px;
            transition: 0.3s;
        }

        nav a:hover {
            color: lightgreen;
        }

        /* TITLE */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 60px;
            text-align: center;
            margin-top: 40px;
        }

        .subtitle {
            text-align: center;
            font-style: italic;
            margin-bottom: 30px;
            color: #ccc;
        }

        h2 {
            text-align: center;
            font-family: 'Playfair Display', serif;
        }

        /* CONTAINER */
        .container {
            display: flex;
            justify-content: space-around;
            padding: 40px;
            gap: 20px;
        }

        /* CARD */
        .column {
            width: 30%;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .column img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            transition: 0.4s;
        }

        .column:hover img {
            transform: scale(1.1);
        }

        /* OVERLAY */
        .overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: rgba(0,0,0,0.6);
            text-align: center;
        }

        .overlay h3 {
            margin: 0;
            font-family: 'Playfair Display', serif;
        }

        a {
            text-decoration: none;
            color: #FFFDD0;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            background: black;
        }

        /* RESPONSIVE */
        @media (max-width: 800px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .column {
                width: 90%;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">VELVET PLATE</div>

    <div>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contacts.html">Contact</a>
    </div>
</nav>

<!-- TITLE -->
<h1>Explore Our Menu</h1>
<p class="subtitle">Discover flavors crafted to perfection</p>

<h2>Choose Your Experience</h2>

<!-- MENU CARDS -->
<div class="container">

    <!-- STARTERS -->
    <a href="starters.html" class="column">
        <img src="starter.jpg" alt="Starters">
        <div class="overlay">
            <h3>Elegant Starters</h3>
        </div>
    </a>

    <!-- MAIN COURSE -->
    <a href="maincourse.html" class="column">
        <img src="maincourse.avif" alt="Main Course">
        <div class="overlay">
            <h3>Main Course</h3>
        </div>
    </a>

    <!-- DESSERTS -->
    <a href="desserts.html" class="column">
        <img src="dessert.webp" alt="Desserts">
        <div class="overlay">
            <h3>Decadent Desserts</h3>
        </div>
    </a>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Velvet Plate | Where Every Bite Tastes Like Luxury</p>
</footer>

</body>
</html>
