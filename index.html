<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<title>The Velvet Plate</title>

<style>

body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url("home2.jpeg");
    background-size: cover;
    background-position: center;
    color: #FFFDD0;
}

/* 🔹 NAVBAR */
nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 20px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

nav a {
    color: #FFFDD0;
    text-decoration: none;
    font-size: 18px;
    letter-spacing: 1px;
    position: relative;
}

/* Hover underline animation */
nav a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #FFFDD0;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* 🔹 HERO SECTION */
.hero {
    text-align: center;
    margin-top: 120px;
}

/* Main Title */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 75px;
    margin: 0;
    text-shadow: 3px 3px 15px black;
}

/* Subtitle */
.tagline {
    font-family: 'Great Vibes', cursive;
    font-size: 40px;
    margin-top: 20px;
    color: #f5e6c4;
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 40px;
    padding: 12px 30px;
    border: 1px solid #FFFDD0;
    color: #FFFDD0;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #FFFDD0;
    color: black;
}

/* Footer line */
.footer-line {
    width: 60%;
    margin: 60px auto;
    border: 0.5px solid rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<!-- 🔹 NAVBAR -->
<nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="contacts.html">Contact</a>
    <a href="about.html">About</a>
</nav>

<!-- 🔹 HERO SECTION -->
<div class="hero">
    <h1>The Velvet Plate</h1>
    <p class="tagline">Where Every Bite Tastes Like Luxury</p>

    <a href="menu.html" class="btn">Explore Menu</a>
</div>

<hr class="footer-line">

</body>
</html>
